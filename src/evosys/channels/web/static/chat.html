<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EvoSys Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #e0e0e0;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    background: #16213e; padding: 12px 20px;
    border-bottom: 1px solid #0f3460;
    display: flex; align-items: center; gap: 10px;
  }
  header h1 { font-size: 18px; color: #e94560; }
  header .status { font-size: 12px; color: #888; }
  header .status.connected { color: #4ade80; }
  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: #0f3460; color: #fff; }
  .msg.assistant { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; }
  .msg.system { align-self: center; background: transparent; color: #888; font-size: 12px; }
  .msg pre { background: #0d1117; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
  .msg code { font-family: 'SF Mono', Monaco, monospace; font-size: 13px; }
  #input-area {
    padding: 12px 20px; background: #16213e;
    border-top: 1px solid #0f3460;
    display: flex; gap: 10px;
  }
  #input-area input {
    flex: 1; padding: 10px 14px; border-radius: 8px;
    border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0;
    font-size: 14px; outline: none;
  }
  #input-area input:focus { border-color: #e94560; }
  #input-area button {
    padding: 10px 20px; border-radius: 8px; border: none;
    background: #e94560; color: #fff; font-size: 14px; cursor: pointer;
  }
  #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  #input-area button:hover:not(:disabled) { background: #d63851; }
</style>
</head>
<body>
<header>
  <h1>EvoSys</h1>
  <span id="status" class="status">Connecting...</span>
</header>
<div id="messages"></div>
<div id="input-area">
  <input id="input" type="text" placeholder="Ask anything..." autocomplete="off" disabled>
  <button id="send" disabled>Send</button>
</div>

<script>
(function() {
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const statusEl = document.getElementById('status');
  let ws = null;
  let sessionId = null;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws/chat`);

    ws.onopen = () => {
      statusEl.textContent = 'Connected';
      statusEl.className = 'status connected';
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    };

    ws.onclose = () => {
      statusEl.textContent = 'Disconnected — reconnecting...';
      statusEl.className = 'status';
      inputEl.disabled = true;
      sendBtn.disabled = true;
      setTimeout(connect, 2000);
    };

    ws.onmessage = (event) => {
      try {
        const frame = JSON.parse(event.data);
        handleFrame(frame);
      } catch (e) {
        console.error('Parse error:', e);
      }
    };
  }

  function handleFrame(frame) {
    if (frame.session_id) sessionId = frame.session_id;

    switch (frame.type) {
      case 'message':
        addMessage(frame.text, 'assistant');
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
        break;
      case 'stream':
        if (frame.data && frame.data.status === 'started') {
          addMessage('Thinking...', 'system');
        }
        break;
      case 'tool_result':
        if (frame.data) {
          const tool = frame.data.tool || 'unknown';
          const ok = frame.data.success ? '✓' : '✗';
          addMessage(`${ok} ${tool} (${frame.data.latency_ms}ms)`, 'system');
        }
        break;
      case 'error':
        addMessage(`Error: ${frame.error}`, 'system');
        sendBtn.disabled = false;
        inputEl.disabled = false;
        break;
    }
  }

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    addMessage(text, 'user');
    ws.send(JSON.stringify({ type: 'message', text: text, session_id: sessionId }));
    inputEl.value = '';
    sendBtn.disabled = true;
    inputEl.disabled = true;
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  connect();
})();
</script>
</body>
</html>
